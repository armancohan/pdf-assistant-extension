<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArXiv Summarizer</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link rel="stylesheet" href="lib/katex.min.css">
  <script src="lib/katex.min.js"></script>
</head>
<body>
  <!-- Settings overlay -->
  <div id="settings-overlay" class="hidden">
    <div class="settings-panel">
      <h2>Settings</h2>
      <div class="setting-group">
        <label for="provider-select">LLM Provider</label>
        <select id="provider-select">
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI (GPT)</option>
          <option value="gemini">Google (Gemini)</option>
        </select>
      </div>
      <div class="setting-group">
        <label for="api-key-input">API Key</label>
        <input type="password" id="api-key-input" placeholder="Enter your API key">
      </div>
      <div class="setting-group">
        <label for="model-select">Model</label>
        <select id="model-select"></select>
      </div>
      <div class="setting-group">
        <label for="max-pages-input">Max PDF Pages</label>
        <input type="number" id="max-pages-input" min="1" max="200" value="10">
      </div>
      <div class="setting-group">
        <label for="theme-select">Theme</label>
        <select id="theme-select">
          <option value="auto">Auto (System)</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <div class="setting-actions">
        <button id="save-settings-btn" class="btn btn-primary">Save</button>
        <button id="cancel-settings-btn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header>
    <div class="header-left">
      <h1>ArXiv Summarizer</h1>
    </div>
    <button id="settings-btn" class="icon-btn" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </header>

  <!-- Main content -->
  <main>
    <!-- Initial state -->
    <div id="state-initial" class="state">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        <p>Navigate to an arxiv paper and click the extension icon to summarize it.</p>
      </div>
    </div>

    <!-- Detected paper, ready to summarize -->
    <div id="state-ready" class="state hidden">
      <div class="paper-info">
        <span class="paper-id" id="paper-id"></span>
        <span class="paper-pages" id="paper-pages"></span>
      </div>
      <div class="pages-control">
        <label for="pages-input">Pages to summarize</label>
        <input type="number" id="pages-input" min="1" max="999" value="10">
      </div>
      <div class="action-buttons">
        <button id="summarize-btn" class="btn btn-primary btn-large">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          Summarize Paper
        </button>
        <button id="repro-btn" class="btn btn-secondary btn-large">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          Reproduction Brief
        </button>
        <button id="metadata-btn" class="btn btn-secondary btn-large">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy Metadata
        </button>
      </div>
    </div>

    <!-- Loading state -->
    <div id="state-loading" class="state hidden">
      <div class="loading-container">
        <div class="spinner"></div>
        <p id="loading-status">Downloading PDF...</p>
      </div>
    </div>

    <!-- Error state -->
    <div id="state-error" class="state hidden">
      <div class="error-container">
        <p id="error-message"></p>
        <button id="retry-btn" class="btn btn-secondary">Retry</button>
      </div>
    </div>

    <!-- Summary result -->
    <div id="state-summary" class="state hidden">
      <div class="summary-actions">
        <button id="export-md-btn" class="btn btn-secondary btn-small">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export Markdown
        </button>
        <button id="copy-btn" class="btn btn-secondary btn-small">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy
        </button>
        <button id="resummarize-btn" class="btn btn-secondary btn-small hidden">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Re-summarize
        </button>
        <span id="cache-badge" class="cache-badge hidden"></span>
      </div>
      <div id="summary-content" class="summary-content"></div>
      <div class="followup-container">
        <div class="followup-input-row">
          <input type="text" id="followup-input" placeholder="Ask a follow-up question about this paper..." />
          <button id="followup-btn" class="btn btn-primary btn-small" title="Ask">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
